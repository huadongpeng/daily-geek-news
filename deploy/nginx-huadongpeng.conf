# /etc/nginx/sites-available/huadongpeng.com
# 主站: www.huadongpeng.com  |  ICP: 沪ICP备20011155号-1
# 静态根目录: /ws/web/www.huadongpeng.com  (Astro dist/ rsync 目标)
# SSL: 已有通配符证书 _.huadongpeng.com，无需 Let's Encrypt

# ── HTTP → HTTPS ────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name huadongpeng.com www.huadongpeng.com radar.huadongpeng.com;
    return 301 https://www.huadongpeng.com$request_uri;
}

# ── 裸域 + radar 子域 → www 规范跳转（避免 SEO 重复页面）──────
server {
    listen 443 ssl http2;
    server_name huadongpeng.com radar.huadongpeng.com;

    ssl_certificate     /etc/nginx/ssl/wildcard/_.huadongpeng.com.pem;
    ssl_certificate_key /etc/nginx/ssl/wildcard/_.huadongpeng.com.key;

    return 301 https://www.huadongpeng.com$request_uri;
}

# ── 主站 ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.huadongpeng.com;

    root  /ws/web/www.huadongpeng.com;
    index index.html;

    # ── SSL（沿用原有通配符证书）──────────────────────────────
    ssl_certificate     /etc/nginx/ssl/wildcard/_.huadongpeng.com.pem;
    ssl_certificate_key /etc/nginx/ssl/wildcard/_.huadongpeng.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Gzip 压缩（提升首屏速度，利好 SEO Core Web Vitals）─────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── 安全响应头 ────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # ── 原有微信公众平台验证文件（保留）─────────────────────────
    location /WW_verify_kG2dHA4uxLyibScU.txt {
        alias /etc/nginx/file/WW_verify_kG2dHA4uxLyibScU.txt;
    }

    # ── Astro 构建产物：JS/CSS 带 hash 文件名，永久缓存 ─────────
    location ~* \.(js|css|woff2?|ttf|ico|svg|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── AI 生成封面图（purifier.py 写入 /images/covers/）────────
    location /images/covers/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── 其他图片资源 ──────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── HTML / XML / JSON：短缓存，文章更新后快速生效 ─────────
    location ~* \.(html|xml|json)$ {
        expires 10m;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Astro build.format:'directory' 路由规则 ──────────────
    # 访问 /blog/ai-tools/foo/ → 磁盘上对应 /blog/ai-tools/foo/index.html
    location / {
        try_files $uri $uri/index.html =404;
    }

    # ── 辅助文件（屏蔽无意义日志）────────────────────────────
    location = /robots.txt        { access_log off; log_not_found off; }
    location = /ads.txt           { access_log off; }
    location = /sitemap-index.xml { access_log off; }
    location = /favicon.svg       { expires 7d; access_log off; }

    # ── 日志 ─────────────────────────────────────────────────
    access_log /var/log/nginx/huadongpeng.access.log;
    error_log  /var/log/nginx/huadongpeng.error.log warn;
}
