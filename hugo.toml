baseURL = 'https://radar.huadongpeng.com/'
languageCode = 'zh-cn'
title = 'Easton 跨国智库'
theme = 'PaperMod'

[params]
  author = "Easton Hua"
  defaultTheme = "auto"
  description = "每日自动化扫描 72 个海外权威信息源，DeepSeek V4 Pro 深度推理，输出中文可执行情报。"
  keywords = ["跨国商业", "套利", "AI", "独立开发者", "海外情报", "商业分析", "零成本创业", "中国出海"]
  ShowReadingTime = true
  ShowToc = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowShareButtons = false
  ShowFullTextinRSS = true
  dateFormat = "2006-01-02"
  assets.favicon = "/logo.svg"
  assets.favicon16x16 = "/logo.svg"
  assets.favicon32x32 = "/logo.svg"
  assets.apple_touch_icon = "/logo.svg"

  [params.homeInfoParams]
    Title = "Easton 跨国智库"
    Content = """
    每日自动化扫描 **72 个全球权威信息源**，DeepSeek V4 Pro 深度推理，输出中文可执行商业情报。

    **六大情报线**：套利雷达 · 跨国脑洞 · 中国出海 · AI 前沿 · 开发者金矿 · 宏观风向

    关注公众号「**老花有话说**」获取每日推送 · 📧 hdop1993@gmail.com
    """

  [[params.socialIcons]]
    name = "email"
    url = "mailto:hdop1993@gmail.com"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/huadongpeng"

