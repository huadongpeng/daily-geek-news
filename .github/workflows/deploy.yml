name: Easton Radar — Build & Deploy

on:
  schedule:
    - cron: "0 22 * * *"   # 06:00 BJT (UTC+8)
    - cron: "0 10 * * *"   # 18:00 BJT
  workflow_dispatch:
    inputs:
      slot:
        description: "批次 (auto/morning/evening)"
        required: false
        default: "auto"
        type: choice
        options: [auto, morning, evening]

# Only need write access to push generated content back to the repo
permissions:
  contents: write

# Prevent concurrent runs from pushing to main simultaneously.
# cancel-in-progress: false → queue the second run, don't kill the first.
# This is the root-cause fix for "rejected: fetch first" errors.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # No submodules needed (Hugo theme is no longer used in build)
          fetch-depth: 0

      # ── 2. Python: run intelligence pipeline ─────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run intelligence pipeline
        env:
          DEEPSEEK_API_KEY:                ${{ secrets.DEEPSEEK_API_KEY }}
          SILICONFLOW_API_KEY:             ${{ secrets.SILICONFLOW_API_KEY }}
          DEEPSEEK_FLASH_MODEL:            ${{ vars.DEEPSEEK_FLASH_MODEL    || 'deepseek-v4-flash' }}
          DEEPSEEK_FLASH_THINKING:         ${{ vars.DEEPSEEK_FLASH_THINKING || 'disabled' }}
          DEEPSEEK_FLASH_REASONING_EFFORT: ${{ vars.DEEPSEEK_FLASH_REASONING_EFFORT || 'low' }}
          DEEPSEEK_PRO_MODEL:              ${{ vars.DEEPSEEK_PRO_MODEL      || 'deepseek-v4-pro' }}
          DEEPSEEK_PRO_THINKING:           ${{ vars.DEEPSEEK_PRO_THINKING   || 'enabled' }}
          DEEPSEEK_PRO_REASONING_EFFORT:   ${{ vars.DEEPSEEK_PRO_REASONING_EFFORT || 'max' }}
          TELEGRAM_BOT_TOKEN:              ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:                ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_THREAD_BRIEFING:              ${{ secrets.TG_THREAD_BRIEFING }}
          EMAIL_FROM:                      ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:                  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:                        ${{ secrets.EMAIL_TO }}
          INDEXNOW_KEY:                    ${{ secrets.INDEXNOW_KEY || 'hdop-indexnow-key' }}
          BAIDU_PUSH_TOKEN:                ${{ secrets.BAIDU_PUSH_TOKEN }}
          PYTHONIOENCODING:                "utf-8"
        run: python purifier.py --slot "${{ github.event.inputs.slot || 'auto' }}"

      # ── 3. Commit generated content + cover images ───────────
      - name: Commit generated content
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "action@github.com"
          git config user.name  "GitHub Action"

          git add src/content/blog/ public/images/covers/
          if git diff --staged --quiet; then
            echo "✅ No new content this run"
            exit 0
          fi

          git commit -m "chore: generate Easton Radar content [$(date -u '+%Y-%m-%d %H:%M UTC')]"

          # concurrency:group=deploy guarantees only one run reaches this line
          # at a time, so a simple push is always a fast-forward.
          # git fetch+rebase is still here as a safety net for the edge case
          # where a developer pushes a hotfix from their local machine mid-run.
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      # ── 4. Node.js: build Astro ───────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build Astro static site
        run: npm run build
        # Outputs to dist/

      # ── 5a. Deploy to VPS via rsync (domestic users) ─────────
      - name: Setup SSH for VPS deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Add VPS host key to known_hosts (avoids interactive prompt)
          ssh-keyscan -H "${{ secrets.VPS_IP }}" >> ~/.ssh/known_hosts

      - name: Deploy dist/ to VPS via rsync
        run: |
          rsync -avz --delete \
            --exclude="/.well-known/" \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/ws/web/www.huadongpeng.com/"

      # GitHub Pages deployment removed — all traffic (domestic + overseas)
      # now routes to VPS via Aliyun DNS default line.
      # VPS wildcard SSL cert covers HTTPS globally.
