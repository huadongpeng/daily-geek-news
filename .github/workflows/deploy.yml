name: Easton Radar — Build & Deploy

on:
  workflow_dispatch:
    inputs:
      slot:
        description: "批次 (auto/morning/evening)"
        required: false
        default: "auto"
        type: choice
        options: [auto, morning, evening]

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  generate-content:
    runs-on: ubuntu-latest
    outputs:
      build_ref: ${{ steps.content-commit.outputs.build_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run intelligence pipeline
        env:
          DEEPSEEK_API_KEY:                ${{ secrets.DEEPSEEK_API_KEY }}
          SILICONFLOW_API_KEY:             ${{ secrets.SILICONFLOW_API_KEY }}
          REDDIT_CLIENT_ID:                ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:            ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT:               ${{ vars.REDDIT_USER_AGENT || 'script:easton-radar:4.0 (by /u/easton-radar)' }}
          TAVILY_API_KEY:                  ${{ secrets.TAVILY_API_KEY }}
          ALLOW_POLLINATIONS_COVER:        ${{ vars.ALLOW_POLLINATIONS_COVER || 'true' }}
          DEEPSEEK_FLASH_MODEL:            ${{ vars.DEEPSEEK_FLASH_MODEL    || 'deepseek-v4-flash' }}
          DEEPSEEK_FLASH_THINKING:         ${{ vars.DEEPSEEK_FLASH_THINKING || 'disabled' }}
          DEEPSEEK_FLASH_REASONING_EFFORT: ${{ vars.DEEPSEEK_FLASH_REASONING_EFFORT || 'low' }}
          DEEPSEEK_PRO_MODEL:              ${{ vars.DEEPSEEK_PRO_MODEL      || 'deepseek-v4-pro' }}
          DEEPSEEK_PRO_THINKING:           ${{ vars.DEEPSEEK_PRO_THINKING   || 'enabled' }}
          DEEPSEEK_PRO_REASONING_EFFORT:   ${{ vars.DEEPSEEK_PRO_REASONING_EFFORT || 'max' }}
          TELEGRAM_BOT_TOKEN:              ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:                ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_THREAD_BRIEFING:              ${{ secrets.TG_THREAD_BRIEFING }}
          TG_THREAD_AI:                    ${{ secrets.TG_THREAD_AI }}
          TG_THREAD_ARBITRAGE:             ${{ secrets.TG_THREAD_ARBITRAGE }}
          TG_THREAD_CHINA:                 ${{ secrets.TG_THREAD_CHINA }}
          TG_THREAD_CROSS:                 ${{ secrets.TG_THREAD_CROSS }}
          TG_THREAD_DEV:                   ${{ secrets.TG_THREAD_DEV }}
          TG_THREAD_MACRO:                 ${{ secrets.TG_THREAD_MACRO }}
          EMAIL_FROM:                      ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:                  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:                        ${{ secrets.EMAIL_TO }}
          WECHAT_DRAFT_ENABLED:            "false"
          INDEXNOW_KEY:                    ${{ secrets.INDEXNOW_KEY || 'hdop-indexnow-key' }}
          BAIDU_PUSH_TOKEN:                ${{ secrets.BAIDU_PUSH_TOKEN }}
          PYTHONIOENCODING:                "utf-8"
        run: python purifier.py --slot "${{ github.event.inputs.slot || 'auto' }}"

      - name: Upload pipeline cache/log artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: radar-runtime-artifacts
          path: |
            .cache/radar/new_push_urls.json
            .cache/radar/pending_push_urls_*.json
            .cache/radar/source_health.json
            outputs/wechat_articles/**/*
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit generated content
        id: content-commit
        run: |
          git config user.email "action@github.com"
          git config user.name  "GitHub Action"

          git add src/content/blog/ public/images/covers/
          git status --short
          if git diff --staged --quiet; then
            echo "✅ No new content this run"
            echo "build_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: generate Easton Radar content [skip ci] [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git fetch origin main
          git rebase origin/main
          echo "build_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            echo "git push failed on attempt ${attempt}; refreshing main before retry..."
            git fetch origin main
            git rebase origin/main
            sleep $((attempt * 5))
          done

          echo "git push failed after 3 attempts"
          exit 1

  build:
    needs: [generate-content]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.generate-content.outputs.build_ref || 'main' }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build Astro static site
        env:
          PUBLIC_ENABLE_ANALYTICS: ${{ vars.PUBLIC_ENABLE_ANALYTICS || 'true' }}
          PUBLIC_ENABLE_ADS:       ${{ vars.PUBLIC_ENABLE_ADS || 'true' }}
          PUBLIC_GA_ID:            ${{ vars.PUBLIC_GA_ID || 'G-LR1QZPH754' }}
          PUBLIC_ADSENSE_CLIENT:   ${{ vars.PUBLIC_ADSENSE_CLIENT || 'ca-pub-4007535026028552' }}
          PUBLIC_BAIDU_VERIFY:     ${{ vars.PUBLIC_BAIDU_VERIFY || 'codeva-yNSx2HYKbG' }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: astro-dist
          path: dist/
          retention-days: 7

  deploy-vps:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout deployment helpers
        uses: actions/checkout@v5

      - name: Download dist artifact
        uses: actions/download-artifact@v5
        with:
          name: astro-dist
          path: dist

      - name: Download pipeline artifacts
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: radar-runtime-artifacts
          path: radar-runtime-artifacts

      - name: Setup SSH for VPS deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_IP }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host %s\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n' "${{ secrets.VPS_IP }}" >> ~/.ssh/config

      - name: Deploy dist/ to VPS via rsync
        run: |
          rsync -avz --delete \
            --exclude="/.well-known/" \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/ws/web/www.huadongpeng.com/"

      - name: Push WeChat drafts from VPS
        env:
          WECHAT_DRAFT_SCRIPT_PATH: ${{ vars.WECHAT_DRAFT_SCRIPT_PATH || '/ws/scripts/easton_wechat_draft_push.py' }}
          WECHAT_DRAFT_REMOTE_DIR:  ${{ vars.WECHAT_DRAFT_REMOTE_DIR || '/tmp/easton-radar-wechat' }}
        run: |
          set -euo pipefail
          DRAFT_SRC="$(find radar-runtime-artifacts -path '*/outputs/wechat_articles' -type d -print -quit 2>/dev/null || true)"
          if [ -z "$DRAFT_SRC" ]; then
            echo "No WeChat draft artifact directory found; skip WeChat draft push."
            exit 0
          fi
          if ! find "$DRAFT_SRC" -name '*-draft.json' -print -quit | grep -q .; then
            echo "No WeChat draft payloads found; skip WeChat draft push."
            exit 0
          fi

          REMOTE_SCRIPT_DIR="$(dirname "$WECHAT_DRAFT_SCRIPT_PATH")"
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}" \
            "mkdir -p \"$REMOTE_SCRIPT_DIR\" \"$WECHAT_DRAFT_REMOTE_DIR\""
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            deploy/wechat_draft_push.py \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:$WECHAT_DRAFT_SCRIPT_PATH"

          # Verify the new script landed (must contain the parse_known_args / --input-dir support)
          if ! ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}" \
              "grep -q 'input_dir_option' \"$WECHAT_DRAFT_SCRIPT_PATH\" 2>/dev/null"; then
            echo "::warning:: VPS script at $WECHAT_DRAFT_SCRIPT_PATH appears to be the old version — rsync may have failed"
          fi

          # Clear stale Python bytecode cache so the updated script is guaranteed to run
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}" \
            "find \"$REMOTE_SCRIPT_DIR\" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null; echo 'Cleared __pycache__ under' \"$REMOTE_SCRIPT_DIR\""

          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" \
            "$DRAFT_SRC/" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:$WECHAT_DRAFT_REMOTE_DIR/"
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}" \
            "python3 \"$WECHAT_DRAFT_SCRIPT_PATH\" \"$WECHAT_DRAFT_REMOTE_DIR\""

      - name: Submit deployed URLs to search engines
        env:
          SITE_URL:                ${{ vars.SITE_URL || 'https://www.huadongpeng.com' }}
          INDEXNOW_KEY:           ${{ secrets.INDEXNOW_KEY || 'hdop-indexnow-key' }}
          BAIDU_PUSH_TOKEN:       ${{ secrets.BAIDU_PUSH_TOKEN }}
          SEARCH_PUSH_STATE_DIR:  ${{ vars.SEARCH_PUSH_STATE_DIR || '/ws/state/easton-radar-search-push' }}
        run: |
          URLS_FILE="$(find radar-runtime-artifacts -name 'new_push_urls.json' -print -quit 2>/dev/null || true)"
          if [ -z "$URLS_FILE" ]; then
            echo "No newly generated site URLs found; skip search-engine push."
            exit 0
          fi
          mkdir -p radar-runtime-artifacts/.cache/radar
          mkdir -p search-push-state
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}" "mkdir -p \"$SEARCH_PUSH_STATE_DIR\""
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}" "cat \"$SEARCH_PUSH_STATE_DIR/pending_push_urls_indexnow.json\" 2>/dev/null || true" > search-push-state/pending_push_urls_indexnow.json
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}" "cat \"$SEARCH_PUSH_STATE_DIR/pending_push_urls_baidu.json\" 2>/dev/null || true" > search-push-state/pending_push_urls_baidu.json
          python3 tools/submit_search_engines.py \
            --urls-file "$URLS_FILE" \
            --output-dir radar-runtime-artifacts/.cache/radar \
            --pending-dir search-push-state
          for service in indexnow baidu; do
            file="search-push-state/pending_push_urls_${service}.json"
            if [ -s "$file" ]; then
              scp -i ~/.ssh/deploy_key "$file" "${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:$SEARCH_PUSH_STATE_DIR/"
            else
              ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}" "rm -f \"$SEARCH_PUSH_STATE_DIR/pending_push_urls_${service}.json\""
            fi
          done

      - name: Upload search push results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: search-push-results
          path: |
            radar-runtime-artifacts/.cache/radar/search_push_results.json
            radar-runtime-artifacts/.cache/radar/pending_push_urls_*.json
          if-no-files-found: ignore
          retention-days: 14
