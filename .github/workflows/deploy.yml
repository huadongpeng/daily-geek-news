name: Easton Radar — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "public/**"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  schedule:
    - cron: "0 22 * * *"   # 06:00 BJT (UTC+8)
    - cron: "0 10 * * *"   # 18:00 BJT
  workflow_dispatch:
    inputs:
      slot:
        description: "批次 (auto/morning/evening)"
        required: false
        default: "auto"
        type: choice
        options: [auto, morning, evening]

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  generate-content:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run intelligence pipeline
        env:
          DEEPSEEK_API_KEY:                ${{ secrets.DEEPSEEK_API_KEY }}
          SILICONFLOW_API_KEY:             ${{ secrets.SILICONFLOW_API_KEY }}
          ALLOW_POLLINATIONS_COVER:        ${{ vars.ALLOW_POLLINATIONS_COVER || 'true' }}
          DEEPSEEK_FLASH_MODEL:            ${{ vars.DEEPSEEK_FLASH_MODEL    || 'deepseek-v4-flash' }}
          DEEPSEEK_FLASH_THINKING:         ${{ vars.DEEPSEEK_FLASH_THINKING || 'disabled' }}
          DEEPSEEK_FLASH_REASONING_EFFORT: ${{ vars.DEEPSEEK_FLASH_REASONING_EFFORT || 'low' }}
          DEEPSEEK_PRO_MODEL:              ${{ vars.DEEPSEEK_PRO_MODEL      || 'deepseek-v4-pro' }}
          DEEPSEEK_PRO_THINKING:           ${{ vars.DEEPSEEK_PRO_THINKING   || 'enabled' }}
          DEEPSEEK_PRO_REASONING_EFFORT:   ${{ vars.DEEPSEEK_PRO_REASONING_EFFORT || 'max' }}
          TELEGRAM_BOT_TOKEN:              ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:                ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_THREAD_BRIEFING:              ${{ secrets.TG_THREAD_BRIEFING }}
          EMAIL_FROM:                      ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:                  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:                        ${{ secrets.EMAIL_TO }}
          INDEXNOW_KEY:                    ${{ secrets.INDEXNOW_KEY || 'hdop-indexnow-key' }}
          BAIDU_PUSH_TOKEN:                ${{ secrets.BAIDU_PUSH_TOKEN }}
          PYTHONIOENCODING:                "utf-8"
        run: python purifier.py --slot "${{ github.event.inputs.slot || 'auto' }}"

      - name: Upload pipeline cache/log artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radar-runtime-artifacts
          path: |
            .cache/radar/pending_push_urls_*.json
            .cache/radar/source_health.json
            outputs/wechat_articles/*.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit generated content
        run: |
          git config user.email "action@github.com"
          git config user.name  "GitHub Action"

          git add src/content/blog/ public/images/covers/
          if git diff --staged --quiet; then
            echo "✅ No new content this run"
            exit 0
          fi

          git commit -m "chore: generate Easton Radar content [skip ci] [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

  build:
    needs: [generate-content]
    if: ${{ always() && (github.event_name == 'push' || needs.generate-content.result == 'success' || needs.generate-content.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build Astro static site
        env:
          PUBLIC_ENABLE_ANALYTICS: ${{ vars.PUBLIC_ENABLE_ANALYTICS || 'true' }}
          PUBLIC_ENABLE_ADS:       ${{ vars.PUBLIC_ENABLE_ADS || 'true' }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-dist
          path: dist/
          retention-days: 7

  deploy-vps:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: astro-dist
          path: dist

      - name: Setup SSH for VPS deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_IP }}" >> ~/.ssh/known_hosts

      - name: Deploy dist/ to VPS via rsync
        run: |
          rsync -avz --delete \
            --exclude="/.well-known/" \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/ws/web/www.huadongpeng.com/"
