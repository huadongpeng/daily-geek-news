name: Global Arbitrage Radar

on:
  schedule:
    - cron: '0 22 * * *' # 每天北京时间早上 6 点运行
  workflow_dispatch: # 支持手动点击运行测试

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 检出代码
      uses: actions/checkout@v4

    - name: 2. 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安装核心依赖库
      run: |
        python -m pip install --upgrade pip
        pip install feedparser requests edge-tts

    - name: 4. 启动跨国套利分析引擎
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        HALO_TOKEN: ${{ secrets.HALO_TOKEN }}
        HALO_URL: ${{ secrets.HALO_URL }}
      run: python purifier.py
