name: Comaxtek Info Purifier

on:
  schedule:
    # 每天 UTC 时间 22:00 运行（对应北京时间早上 6:00，正好赶上你通勤）
    - cron: '0 22 * * *'
  workflow_dispatch: # 这个指令允许你在网页上随时手动点击“运行”测试

jobs:
  run-purifier:
    runs-on: ubuntu-latest # 使用微软免费提供的海外 Ubuntu 虚拟机

    steps:
    - name: 1. 检出代码
      uses: actions/checkout@v4

    - name: 2. 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install feedparser requests

    - name: 4. 执行提纯引擎
      env: # 将你在仓库配置的 Secrets 映射为虚拟机的环境变量
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        HALO_TOKEN: ${{ secrets.HALO_TOKEN }}
      run: python purifier.py
