name: Easton Radar

on:
  schedule:
    - cron: "0 22 * * *" # 06:00 Beijing
    - cron: "0 10 * * *" # 18:00 Beijing
  workflow_dispatch:
    inputs:
      slot:
        description: "Run slot"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - morning
          - evening
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests ddgs

      - name: Run intelligence pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_THREAD_BRIEFING: ${{ secrets.TG_THREAD_BRIEFING }}
        run: |
          SLOT="${{ github.event.inputs.slot || 'auto' }}"
          python purifier.py --slot "$SLOT"

      - name: Commit generated content
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/posts/ outputs/wechat_articles/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Generate Easton radar content" && git push)

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: radar.huadongpeng.com
